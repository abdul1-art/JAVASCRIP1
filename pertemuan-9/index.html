<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .box {
        width: 200px;
        height: 100px;
        background-color: rgb(208, 216, 54);
        margin: 10px;
        transition: 0.7s ;
      }
      
      .success {
        background-color: aquamarine;
      }
      .remove {
        background-color: aqua;
      }
    </style>
  </head>
  <body>
    <h2>Belajar classlist javaScript</h2>

    <div id="target" class="box">Kotak target</div>

    <button id="btn-add">1. Tambah(.add)</button>
    <button id="btn-remove">2. Hapus(.remove)</button>
    <button id="btn-toggle">3. Sekitar(.toggle)</button>
    <script src="./script.js"></script>
  </body>
</html>
